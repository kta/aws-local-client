name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npm run build

  rust:
    runs-on: ubuntu-latest
    services:
      dynamodb:
        image: amazon/dynamodb-local
        ports:
          - 8000:8000
      # ministack serves the non-DynamoDB integration tests (SQS/SNS/S3/RDS);
      # dynamodb-local only speaks DynamoDB and returns non-XML errors otherwise.
      ministack:
        image: ministackorg/ministack
        ports:
          - 4566:4566
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # tauri::generate_context! embeds the frontend dist, so build it first
      - run: npm ci
      - run: npm run build
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo clippy -- -D warnings
        working-directory: src-tauri
      - run: cargo test
        working-directory: src-tauri
      # The `services:` containers start alongside the job but are not health-gated,
      # so integration tests can fire before dynamodb-local (8000) / ministack (4566)
      # accept connections and fail with a DispatchFailure. Wait until both answer.
      - name: Wait for emulators to accept connections
        run: |
          for url in http://localhost:8000 http://localhost:4566; do
            ready=""
            for i in $(seq 1 60); do
              if curl -s -o /dev/null "$url"; then ready=1; echo "$url ready"; break; fi
              echo "waiting for $url ($i/60)"; sleep 2
            done
            if [ -z "$ready" ]; then echo "::error::$url never became ready"; exit 1; fi
          done
      - name: DynamoDB integration tests against dynamodb-local
        run: cargo test --test integration_ddb -- --ignored
        working-directory: src-tauri
        env:
          DDB_ENDPOINT: http://localhost:8000
      - name: SQS/SNS/S3/RDS integration tests against ministack
        run: cargo test --test integration_sqs --test integration_sns --test integration_s3 --test integration_rds -- --ignored
        working-directory: src-tauri
        env:
          EMU_ENDPOINT: http://localhost:4566
