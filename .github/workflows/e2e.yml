name: E2E

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

# One E2E run per ref: a new push to the same PR cancels the previous run.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# E2E_ENDPOINT default is http://localhost:4566 (see e2e/wdio.conf.ts).
# Emulator lifecycle is driven by scripts/emulator.sh (P2-3 contract):
#   scripts/emulator.sh start|stop|wait <localstack|floci|ministack|kumo|ministack-pip>
# docker-based (port 4566): localstack, floci, ministack, kumo
# pip-based (mac/win runners, no docker): ministack-pip

jobs:
  # Emulator-compatibility matrix: run the full suite against all four
  # docker emulators on Linux. Emulator compatibility is a network-protocol
  # concern and therefore OS-independent (see plan Global Constraints).
  e2e-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emulator: [localstack, floci, ministack, kumo]
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Emulator images (pinned in scripts/emulator.sh):
      #   localstack -> localstack/localstack:3
      #   floci      -> floci/floci:latest
      #   ministack  -> ministackorg/ministack
      #   kumo       -> ghcr.io/sivchari/kumo:0.25.3
      - name: Start emulator (${{ matrix.emulator }})
        run: |
          chmod +x scripts/emulator.sh
          scripts/emulator.sh start ${{ matrix.emulator }}
          scripts/emulator.sh wait ${{ matrix.emulator }}

      # tauri.conf.json beforeBuildCommand runs `npm run build`, so the
      # frontend dist is produced as part of the debug bundle.
      - name: Build debug app binary
        run: npm run e2e:build

      - name: Run E2E suite
        run: xvfb-run --auto-servernum npm run e2e
        env:
          E2E_ENDPOINT: http://localhost:4566

      - name: Stop emulator
        if: always()
        run: scripts/emulator.sh stop ${{ matrix.emulator }}

      - name: Upload wdio logs and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-linux-${{ matrix.emulator }}-artifacts
          path: |
            e2e/logs/
            e2e/screenshots/
          if-no-files-found: ignore

  # OS-compatibility check on macOS with a pip-launched ministack (no docker
  # on the macOS runner). Same suite, single emulator.
  e2e-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Start ministack (pip)
        shell: bash
        run: |
          chmod +x scripts/emulator.sh
          scripts/emulator.sh start ministack-pip
          scripts/emulator.sh wait ministack-pip

      - name: Build debug app binary
        run: npm run e2e:build

      - name: Run E2E suite
        run: npm run e2e
        env:
          E2E_ENDPOINT: http://localhost:4566

      - name: Stop ministack (pip)
        if: always()
        shell: bash
        run: scripts/emulator.sh stop ministack-pip

      - name: Upload wdio logs and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-macos-artifacts
          path: |
            e2e/logs/
            e2e/screenshots/
          if-no-files-found: ignore

  # OS-compatibility check on Windows with a pip-launched ministack.
  # Git Bash is available on windows runners, so use `shell: bash` for the
  # emulator.sh invocations.
  e2e-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Start ministack (pip)
        shell: bash
        run: |
          chmod +x scripts/emulator.sh
          scripts/emulator.sh start ministack-pip
          scripts/emulator.sh wait ministack-pip

      - name: Build debug app binary
        run: npm run e2e:build

      - name: Run E2E suite
        run: npm run e2e
        env:
          E2E_ENDPOINT: http://localhost:4566

      - name: Dump ministack log on failure
        if: failure()
        shell: bash
        run: |
          echo "== installed version =="
          "${TMPDIR:-/tmp}/nlsd-emulator/ministack-venv/Scripts/python.exe" -m pip show ministack | head -3 || true
          echo "== ministack log tail =="
          tail -200 "${TMPDIR:-/tmp}/nlsd-emulator/ministack-pip.log" || true

      - name: Stop ministack (pip)
        if: always()
        shell: bash
        run: scripts/emulator.sh stop ministack-pip

      - name: Upload wdio logs and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-windows-artifacts
          path: |
            e2e/logs/
            e2e/screenshots/
          if-no-files-found: ignore
